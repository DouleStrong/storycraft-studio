services:
  postgres:
    image: docker.io/postgres:16
    restart: always
    environment:
      POSTGRES_DB: storycraft
      POSTGRES_USER: storycraft
      POSTGRES_PASSWORD: storycraft
    ports:
      - 127.0.0.1:5432:5432
    volumes:
      - storycraft_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storycraft -d storycraft"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: docker.io/redis:7
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_AUTH:-myredissecret}
      --maxmemory-policy noeviction
    ports:
      - 127.0.0.1:6379:6379
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_AUTH:-myredissecret} ping"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  storycraft_postgres:
